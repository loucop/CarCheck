<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrotaControl - Seleção</title>

    <link rel="stylesheet" href="../css/style.css" />
    <style>
      /* Estilização para alinhar o botão de voltar */
      .nav-bar {
        display: flex;
        justify-content: flex-start;
        margin-bottom: 15px;
      }
      .btn-voltar {
        background: #475569;
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 0.9em;
        font-weight: bold;
        border: none;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-voltar:hover {
        background: #334155;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="nav-bar">
        <a href="menu.html" class="btn-voltar">← Voltar ao Menu</a>
      </div>

      <header style="text-align: center; margin-bottom: 20px">
        <h2>Selecione o Veículo</h2>
        <p style="color: #94a3b8; font-size: 0.9em">
          Toque no veículo para iniciar o FOR 181
        </p>
      </header>

      <div id="lista-veiculos">
        <p style="text-align: center">Carregando frota...</p>
      </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/frota.js"></script>
  </body>
</html>
