<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrotaControl - FOR 181 v2.0</title>
    <link rel="stylesheet" href="../css/style.css?v=20260701">

    <style>
      .checklist-container {
        background: #1e293b;
        padding: 15px;
        border-radius: 8px;
        margin-top: 10px;
      }
      .item-row {
        border-bottom: 1px solid #334155;
        padding: 12px 0;
        display: flex;
        flex-direction: column;
      }
      .status-btns {
        display: flex;
        gap: 8px;
        margin: 8px 0;
      }
      .btn-opt {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        background: #475569;
        color: white;
      }
      .btn-opt.active-ok {
        background: #10b981 !important;
      }
      .btn-opt.active-ruim {
        background: #ef4444 !important;
      }
      .obs-field {
        width: 100%;
        padding: 8px;
        background: #0f172a;
        border: 1px solid #475569;
        color: white;
        display: none;
        margin-top: 5px;
        border-radius: 4px;
      }
      canvas {
        background: white;
        width: 100%;
        border-radius: 4px;
        cursor: crosshair;
        touch-action: none;
        border: 2px solid #334155;
      }
      .header-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }
      .header-info input {
        padding: 12px;
        border-radius: 4px;
        border: 1px solid #334155;
        background: #0f172a;
        color: white;
      }
      .data-sistema {
        color: #94a3b8;
        font-size: 0.9rem;
        margin-bottom: 10px;
        font-weight: bold;
      }
      /* NOVO: Seção de rotas destacada */
      .rota-section {
        background: #0f172a;
        padding: 15px;
        border-radius: 8px;
        margin: 15px 0;
        border-left: 4px solid #3b82f6;
      }
      .rota-section h3 {
        color: #3b82f6;
        margin-top: 0;
        margin-bottom: 10px;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card" style="max-width: 800px; margin: 20px auto">
      <div
        class="navigation-header"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 15px;
        "
      >
        <button
          onclick="voltarSelecao()"
          style="
            background: #475569;
            padding: 10px 20px;
            font-size: 0.9rem;
            border-radius: 6px;
          "
        >
          ← Voltar / Trocar Veículo
        </button>
      </div>

      <h2>FOR 181 - Inspeção de Veículo v2.0</h2>
      <p
        id="placa-topo"
        style="
          color: #3b82f6;
          font-weight: bold;
          font-size: 1.2rem;
          margin-bottom: 5px;
        "
      ></p>
      <div id="data-display" class="data-sistema"></div>

      <div class="header-info">
        <input
          type="text"
          id="motorista"
          placeholder="Nome do Motorista"
          readonly
          style="background: #1e293b; color: #94a3b8; cursor: not-allowed"
        />
        <input
          type="text"
          id="matricula"
          placeholder="Matrícula"
          readonly
          style="background: #1e293b; color: #94a3b8; cursor: not-allowed"
        />
        <input type="number" id="km" placeholder="KM Atual *" required />
      </div>

      <!-- NOVO: Seção de Rotas -->
      <div class="rota-section">
        <h3>📍 Informações de Rota</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <input 
            type="text" 
            id="local_origem" 
            placeholder="Local de Origem (Ex: Garagem Central)"
            style="padding: 12px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white;"
          />
          <input 
            type="text" 
            id="local_destino" 
            placeholder="Local de Destino (Ex: Posto 02)"
            style="padding: 12px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white;"
          />
        </div>
        <p style="font-size: 0.85rem; color: #94a3b8; margin-top: 8px; margin-bottom: 0;">
          💡 Campos opcionais - úteis para auditoria de quilometragem
        </p>
      </div>

      <h3 style="margin-top: 20px;">Checklist de Conformidade</h3>
      <div id="listaItens" class="checklist-container"></div>

      <h3 style="margin-top: 25px">Mapa de Avarias (Lataria)</h3>
      <canvas id="canvasAvaria" width="600" height="300"></canvas>
      <button
        onclick="limparCanvas()"
        style="background: #64748b; margin-top: 5px; padding: 8px 15px"
      >
        🗑️ Limpar Mapa
      </button>

      <button
        type="button"
        onclick="finalizarRelatorio(event)"
        style="
          background: #10b981;
          width: 100%;
          padding: 20px;
          margin-top: 30px;
          font-weight: bold;
          font-size: 1.1rem;
          cursor: pointer;
          border: none;
          border-radius: 8px;
          color: white;
        "
      >
        ✅ FINALIZAR CHECKLIST E GERAR RELATÓRIO
      </button>
    </div>

    <!-- Scripts -->
    <script src="../js/config.js?v=20260701"></script>
    <script src="../js/checklist.js?v=20260701"></script>
    <script>
      // Guard: redirect to bdv.html if driver has an open BDV
      // M4 Fase 2: guard por presença de `usuario`; /bdv/ativo via apiFetch
      // (um 401 é tratado centralmente por apiFetch → login.html).
      (function () {
        const _init = window.onload;
        window.onload = async function () {
          const dados = localStorage.getItem("usuario");
          if (dados) {
            try {
              const ativo = await apiFetch("/bdv/ativo");
              if (ativo.ok) {
                window.location.href = "bdv.html";
                return;
              }
              // A6: motorista com checklist órfão (sem BDV) → roteia p/ abrir o BDV.
              // Gated a motorista: p/ vistoriador o checklist é estado final válido.
              const usuario = JSON.parse(dados);
              if (usuario.nivel_acesso === "motorista") {
                const pendente = await apiFetch("/checklist/pendente");
                if (pendente.ok) {
                  window.location.href = "bdv.html";
                  return;
                }
              }
            } catch (e) {
              // 401: apiFetch já redirecionou ao login — não siga p/ _init
              // (evita o alerta de "Sessão expirada" de inicializarPagina).
              if (e && e.isAuthRedirect) return;
              /* erro de rede — segue normal */
            }
          }
          if (_init) _init();
        };
      })();

      // Back-button guard: redirect on bfcache restore if a BDV is now open
      window.addEventListener('pageshow', async function(event) {
        const dados = localStorage.getItem('usuario');
        if (!dados) { window.location.replace('login.html'); return; }
        if (!event.persisted) return;

        try {
          const ativo = await apiFetch('/bdv/ativo');
          if (ativo.ok) { window.location.replace('bdv.html'); return; }
          // A6: motorista com checklist órfão → abrir o BDV dele (gated a motorista).
          const usuario = JSON.parse(dados);
          if (usuario.nivel_acesso === 'motorista') {
            const pendente = await apiFetch('/checklist/pendente');
            if (pendente.ok) window.location.replace('bdv.html');
          }
        } catch (e) {
          if (e && e.isAuthRedirect) return;
          /* erro de rede — fica */
        }
      });
    </script>
  </body>
</html>
