<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Operacional - FrotaControl</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }

      .menu-card {
        background: #1e293b;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s, border-color 0.2s, background 0.2s;
        border: 2px solid transparent;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .menu-card:hover:not(.disabled) {
        transform: translateY(-5px);
        border-color: #3b82f6;
        background: #26334d;
      }

      .menu-card.disabled {
        opacity: 0.5;
        cursor: not-allowed;
        filter: grayscale(1);
      }

      .menu-card .icon {
        font-size: 3rem;
        margin-bottom: 15px;
      }

      .menu-card h3 {
        color: #f8fafc;
        margin-bottom: 8px;
        font-size: 1.4rem;
      }

      .menu-card p {
        color: #94a3b8;
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .user-welcome {
        background: #0f172a;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        border-left: 4px solid #10b981;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .status-dot {
        height: 10px;
        width: 10px;
        background-color: #10b981;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
        box-shadow: 0 0 8px #10b981;
      }

      .btn-logout {
        background: #ef4444;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 40px;
        width: 100%;
        transition: background 0.2s;
      }

      .btn-logout:hover {
        background: #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="card" style="max-width: 900px; margin: 40px auto">
      <header>
        <h1>Portal de Sistemas</h1>
        <div class="user-welcome">
          <div>
            <p style="margin: 0; font-size: 0.8rem; color: #94a3b8">
              Operador Logado:
            </p>
            <strong
              id="nome-operador"
              style="color: #f8fafc; font-size: 1.1rem"
            >
              Carregando...
            </strong>
          </div>
          <div style="text-align: right">
            <span class="status-dot"></span>
            <span style="color: #10b981; font-size: 0.8rem; font-weight: bold">
              SISTEMA ATIVO
            </span>
          </div>
        </div>
      </header>

      <div class="menu-grid">
        <div id="card-carcheck" class="menu-card" onclick="acessarSistema('carcheck')">
          <div class="icon">🚗</div>
          <h3>CarCheck</h3>
          <p>Inspeção Veicular (FOR 181), Mapa de Avarias e Registro de KM.</p>
        </div>

        <div
          id="card-admin"
          class="menu-card"
          onclick="acessarSistema('admin')"
          style="display: none;"
        >
          <div class="icon">📊</div>
          <h3>Painel Admin</h3>
          <p>Auditoria de inspeções e gestão de frota.</p>
        </div>
      </div>

      <button class="btn-logout" onclick="fazerLogout()">
        Sair do Sistema
      </button>
    </div>

    <script>
      // LOGICA DE INICIALIZAÇÃO E SEGURANÇA v3.0
      document.addEventListener("DOMContentLoaded", async () => {
          const dadosSessao = localStorage.getItem("usuario");
          const token = localStorage.getItem("token");

          // Validação de Sessão
          if (!dadosSessao || !token) {
              console.warn("[AUTH] Sessão não encontrada. Redirecionando...");
              window.location.href = "login.html";
              return;
          }

          const usuario = JSON.parse(dadosSessao);

          // Atualização da Interface
          document.getElementById("nome-operador").innerText = usuario.nome.toUpperCase();

          // Controle de Acesso
          const adminCard    = document.getElementById("card-admin");
          const carCheckCard = document.getElementById("card-carcheck");

          if (usuario.nivel_acesso === "admin") {
              adminCard.style.display    = "flex";
              carCheckCard.style.display = "none";
          } else {
              adminCard.style.display    = "none";
              carCheckCard.style.display = "flex";
          }

          if (usuario.nivel_acesso === "motorista") {
              try {
                  const res = await fetch(`${CONFIG.API_BASE_URL}/bdv/ativo`, {
                      headers: { "Authorization": `Bearer ${token}` }
                  });
                  if (res.ok) {
                      window.location.href = "bdv.html";
                  }
              } catch (e) {
                  // network error — stay on menu
              }
          }
      });

      // NAVEGAÇÃO ENTRE MÓDULOS
      function acessarSistema(sistema) {
          if (sistema === "carcheck") {
              window.location.href = "selecao.html";
          } else if (sistema === "admin") {
              window.location.href = "admin-dashboard.html";
          }
      }

      // Back-button guard: re-run BDV active check for motorista
      window.addEventListener('pageshow', async () => {
          const dadosSessao = localStorage.getItem('usuario');
          const token       = localStorage.getItem('token');
          if (!dadosSessao || !token) return;
          const usuario = JSON.parse(dadosSessao);
          if (usuario.nivel_acesso === 'motorista') {
              try {
                  const res = await fetch(`${CONFIG.API_BASE_URL}/bdv/ativo`, {
                      headers: { 'Authorization': `Bearer ${token}` }
                  });
                  if (res.ok) {
                      window.location.href = 'bdv.html';
                  }
              } catch (e) { /* network error — stay */ }
          }
      });

      // FINALIZAÇÃO DE SESSÃO
      function fazerLogout() {
          if (confirm("Deseja realmente encerrar a sessão operacional?")) {
              localStorage.clear();
              window.location.href = "login.html";
          }
      }
    </script>
  </body>
</html>
